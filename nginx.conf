server {
    listen 80;
    server_name tributoo.com www.tributoo.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tributoo.com www.tributoo.com;

    ssl_certificate /etc/letsencrypt/live/tributoo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tributoo.com/privkey.pem;

    # SEO endpoints always go to Express (sitemap, robots, bot prerender)
    location = /sitemap.xml {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
    }

    location = /robots.txt {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
    }

    # API requests go to Express
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /uploads/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
    }

    # Bot detection — route crawlers to Express prerender endpoints
    # All other traffic gets the React SPA (static files)
    location / {
        # Detect known bots
        set $is_bot 0;
        if ($http_user_agent ~* "(googlebot|bingbot|slurp|duckduckbot|baiduspider|yandexbot|facebookexternalhit|twitterbot|linkedinbot|whatsapp|telegrambot|applebot|slackbot)") {
            set $is_bot 1;
        }

        # Route bots to Express for prerendering
        if ($is_bot = 1) {
            proxy_pass http://localhost:3001;
            break;
        }

        # Regular users: serve React SPA
        # Option A: if serving built files from this server
        root /var/www/tributoo/dist;
        try_files $uri $uri/ /index.html;

        # Option B: if frontend is on S3, use CloudFront and point DNS there
        # (remove the root/try_files lines above and configure CloudFront separately)
    }
}
